services:
  ollama:
    build: ./ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen3:0.6b
      EMBED_MODEL: nomic-embed-text
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
